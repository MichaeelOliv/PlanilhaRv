<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador RV 2025 - Negócios</title>
    <style>
        :root {
            --primary: #2563eb;
            --secondary: #64748b;
            --success: #10b981;
            --dark: #0f172a;
            --light: #f8fafc;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: #f1f5f9;
            color: var(--dark);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .card {
            background: white;
            max-width: 800px;
            width: 100%;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .header {
            background: var(--dark);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .content {
            padding: 25px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        @media (max-width: 600px) {
            .content { grid-template-columns: 1fr; }
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--secondary);
        }

        select, input {
            padding: 10px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 1rem;
        }

        .results {
            grid-column: 1 / -1;
            background: var(--light);
            border-radius: 8px;
            padding: 20px;
            margin-top: 10px;
            border-left: 4px solid var(--primary);
        }

        .result-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 1.1rem;
        }

        .total {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--primary);
            border-top: 2px solid #e2e8f0;
            padding-top: 10px;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <h2 style="margin:0">Simulador RV 2025</h2>
        <p style="margin:5px 0 0; opacity:0.8">Negócios - Ajuste Acordo</p>
    </div>

    <div class="content">
        <div class="form-group">
            <label>Cargo</label>
            <select id="cargo" onchange="calcular()">
                <option value="2348.24" selected>Agente de Microcrédito Urbano</option>
                <option value="5176.63">Coordenador Regional</option>
                <option value="3912.01">Coordenador de Unidade</option>
                <option value="2752.90">Coordenador de Carteira</option>
                <option value="6860.44">Gerente de Operações</option>
            </select>
        </div>

        <div class="form-group">
            <label>Tipo de Mercado</label>
            <select id="tipoMercado" onchange="calcular()">
                <option value="0">Mercado 1</option>
                <option value="1">Mercado 2</option>
                <option value="2">Mercado 3</option>
            </select>
        </div>

        <div class="form-group">
            <label>Incremento Médio (1 a 10)</label>
            <input type="number" id="incremento" value="5" min="1" max="10" oninput="calcular()">
        </div>

        <div class="form-group">
            <label>Desembolso Mensal (R$)</label>
            <input type="number" id="desembolso" value="150000" oninput="calcular()">
        </div>

        <div class="form-group">
            <label>% Reembolso (ex: 95)</label>
            <input type="number" id="reembolso" value="95" oninput="calcular()">
        </div>

        <div class="form-group">
            <label>% Adimplência (ex: 97)</label>
            <input type="number" id="adimplencia" value="97" oninput="calcular()">
        </div>

        <div class="results">
            <div class="result-item">
                <span>Ref. Cargo:</span>
                <span id="resRefCargo">R$ 0,00</span>
            </div>
            <div class="result-item">
                <span>Fator Ponderado:</span>
                <span id="resFator">0.00%</span>
            </div>
            <div class="result-item">
                <span>Bônus de Gestão (10%):</span>
                <span id="resBonus">R$ 0,00</span>
            </div>
            <div class="total">
                <span>Total RV Estimado:</span>
                <span id="resTotal">R$ 0,00</span>
            </div>
        </div>
    </div>
</div>

<script>
    const tabelasMercado = [
        [0, 0.25, 0.5, 0.75, 1, 1.075, 1.15, 1.22, 1.30, 1.30],
        [0, 0.2, 0.4, 0.6, 0.8, 1, 1.075, 1.15, 1.22, 1.30],
        [0, 0.15, 0.3, 0.45, 0.6, 0.8, 1, 1.075, 1.15, 1.22]
    ];

    function getFatorDesembolso(val) {
        if (val < 100000) return 0;
        if (val <= 110000) return 0.01;
        if (val <= 120000) return 0.03;
        if (val <= 150000) return 0.075;
        if (val <= 200000) return 0.15;
        if (val <= 300000) return 0.5;
        return 1.0;
    }

    function getFatorReembolso(val) {
        let p = val / 100;
        if (p < 0.90) return 0;
        if (p <= 0.91) return 0.2;
        if (p <= 0.93) return 0.6;
        if (p <= 0.94) return 0.8;
        return 1.0;
    }

    function getFatorAdimplencia(val) {
        let p = val / 100;
        if (p < 0.93) return 0;
        if (p < 0.95) return 0.15;
        if (p < 0.97) return 0.58;
        return 1.0;
    }

    function calcular() {
        const selectCargo = document.getElementById('cargo');
        const refCargo = parseFloat(selectCargo.value);
        const nomeCargo = selectCargo.options[selectCargo.selectedIndex].text;
        
        const tipoMercado = parseInt(document.getElementById('tipoMercado').value);
        const incremento = Math.min(Math.max(parseInt(document.getElementById('incremento').value) || 1, 1), 10);
        const desembolso = parseFloat(document.getElementById('desembolso').value) || 0;
        const reembolso = parseFloat(document.getElementById('reembolso').value) || 0;
        const adimplencia = parseFloat(document.getElementById('adimplencia').value) || 0;

        const fMercado = tabelasMercado[tipoMercado][incremento - 1];
        const fDesembolso = getFatorDesembolso(desembolso);
        const fReembolso = getFatorReembolso(reembolso);
        const fAdimplencia = getFatorAdimplencia(adimplencia);

        // Pesos: 35% Mercado, 30% Desembolso, 15% Reembolso, 20% Adimplência
        // Removida a trava de 1.0 para permitir que fatores de mercado excelentes aumentem o RV
        let fatorFinal = (fMercado * 0.35) + (fDesembolso * 0.30) + (fReembolso * 0.15) + (fAdimplencia * 0.20);

        let rvBase = refCargo * fatorFinal;

        // Bônus de Gestão (apenas para coordenadores/gerentes)
        let bonus = 0;
        if (nomeCargo !== "Agente de Microcrédito Urbano" && fMercado >= 1) {
            bonus = refCargo * 0.10;
        }

        const totalGeral = rvBase + bonus;

        document.getElementById('resRefCargo').innerText = refCargo.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
        document.getElementById('resFator').innerText = (fatorFinal * 100).toFixed(2) + '%';
        document.getElementById('resBonus').innerText = bonus.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
        document.getElementById('resTotal').innerText = totalGeral.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
    }

    calcular();
</script>

</body>
</html>
